server:
  port: 8080

spring:
  application:
    name: dataops-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dataops}
    username: ${SPRING_DATASOURCE_USERNAME:dataops}
    password: ${SPRING_DATASOURCE_PASSWORD:dataops}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this}
    expiration-ms: 86400000

services:
  ai:
    url: ${AI_SERVICE_URL:http://localhost:8000}

